services:
  - type: web
    name: bhashabond-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_TRANSLATE_API_KEY
        value: ""
      - key: SUPABASE_URL
        value: ""
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: ""
